name: Deploy on Tag

# 跟 adminBackend 同款单 job + 单 endpoint 模式。
#
# tag → 服务器派发约定:
#   v260522173216       → 部署到默认 vars.PORTAINER_ENDPOINT_ID
#   v260522173216@2     → 部署到 endpoint id = 2 (覆盖默认)
#   v260522173216@host5 → 部署到 vars.PORTAINER_ENDPOINT_ID 同样默认
#                          (@后面如果不是纯数字,fallback 默认 — 留给未来 vars 查表用)
#
# 想加机器:多打一个 tag,带 @id 后缀就行,不用改 workflow。

on:
  push:
    tags:
      - '*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Login to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ vars.HARBOR_URL }} -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${{ vars.HARBOR_URL }}/${{ vars.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "Building and pushing image: $IMAGE_TAG"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"

      - name: Sign Container Image
        env:
          COSIGN_PASSWORD: "${{ secrets.COSIGN_PASSWORD }}"
          COSIGN_EXPERIMENTAL: 1
        run: |
          IMAGE_TAG="${{ vars.HARBOR_URL }}/${{ vars.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          chmod 600 cosign.key
          echo "Signing image: $IMAGE_TAG"
          cosign sign --key cosign.key "$IMAGE_TAG"
          rm -f cosign.key

      - name: Replace Container via Portainer (pull-first + rename-rollback)
        # 流程:
        #   1. 解析 tag 后缀,决定 endpoint id (vXXX → 默认, vXXX@2 → endpoint 2)
        #   2. pull 新镜像(老容器还活着)
        #   3. inspect 验证镜像
        #   4. 老容器 stop + 改名为 <name>-old-<run_id>
        #   5. create + start 新容器
        #   6. 等 8s + State.Running 检查,失败 → 回滚老容器
        #   7. 成功 → 删备份
        run: |
          set -euo pipefail

          # ===== tag → endpoint 派发 =====
          TAG_NAME="${{ github.ref_name }}"
          ENDPOINT_ID="${{ vars.PORTAINER_ENDPOINT_ID }}"
          if [[ "$TAG_NAME" =~ @([0-9]+)$ ]]; then
            ENDPOINT_ID="${BASH_REMATCH[1]}"
            echo "==> tag 后缀 @${ENDPOINT_ID} 覆盖默认 endpoint"
          else
            echo "==> 使用默认 endpoint id = ${ENDPOINT_ID}"
          fi
          if [ -z "$ENDPOINT_ID" ]; then
            echo "ERROR: ENDPOINT_ID 为空 — 检查 vars.PORTAINER_ENDPOINT_ID 是否配置"
            exit 1
          fi

          IMAGE_TAG="${{ vars.HARBOR_URL }}/${{ vars.IMAGE_NAME }}:${{ github.ref_name }}"
          IMAGE_NAME=$(jq -rn --arg v "$IMAGE_TAG" '@uri "\($v)"')
          CONTAINER_NAME="${{ vars.CONTAINER_NAME }}"
          [ -z "$CONTAINER_NAME" ] && CONTAINER_NAME="docker-host-master"
          PORTAINER_URL="${{ vars.PORTAINER_URL }}"
          OLD_NAME="${CONTAINER_NAME}-old-${GITHUB_RUN_ID}"
          PORTAINER_BASE="${PORTAINER_URL}/endpoints/${ENDPOINT_ID}/docker"

          # Redis 默认走 janyee_net docker DNS (redis:6379)
          REDIS_ADDR="${{ vars.REDIS_ADDR }}"
          [ -z "$REDIS_ADDR" ] && REDIS_ADDR="redis:6379"
          REDIS_DB="${{ vars.REDIS_DB }}"
          [ -z "$REDIS_DB" ] && REDIS_DB="3"

          api() {
            local method=$1 path=$2; shift 2
            curl -fsS --retry 3 --retry-delay 2 -X "$method" \
              -H "X-API-Key: ${{ secrets.PORTAINER_ACCESS_TOKEN }}" \
              "$@" "${PORTAINER_BASE}${path}"
          }

          container_id_by_name() {
            local name=$1
            api GET "/containers/json?all=true" \
              | jq -r --arg n "/$name" '.[] | select(.Names[] == $n) | .Id' | head -1
          }

          rollback() {
            local old_renamed=$1 new_id=${2:-}
            echo "==> ROLLBACK:把 $old_renamed 改回 $CONTAINER_NAME 并启动"
            if [ -n "$new_id" ]; then
              api POST "/containers/$new_id/stop" || true
              api DELETE "/containers/$new_id?force=true" || true
            fi
            local old_id
            old_id=$(container_id_by_name "$old_renamed" || true)
            if [ -z "$old_id" ]; then
              echo "  备份容器 $old_renamed 不见了,无法回滚"
              return 1
            fi
            api POST "/containers/$old_id/rename?name=$CONTAINER_NAME"
            api POST "/containers/$old_id/start"
            echo "==> ROLLBACK 完成,服务恢复到老版本"
          }

          echo "==> 清理上次失败留下的 ${CONTAINER_NAME}-old-* 备份"
          STALE=$(api GET "/containers/json?all=true" \
            | jq -r --arg p "/${CONTAINER_NAME}-old-" '.[] | select(.Names[] | startswith($p)) | .Id') || true
          for sid in $STALE; do
            echo "  删除残留 $sid"
            api DELETE "/containers/$sid?force=true" || true
          done

          echo "==> Step 1/5: pull 镜像 $IMAGE_TAG (老容器先不动)"
          sleep 5
          PULL_BODY=$(curl -fsS --retry 3 --retry-delay 2 -X POST \
            -H "X-API-Key: ${{ secrets.PORTAINER_ACCESS_TOKEN }}" \
            -H "X-Registry-Auth: ${{ secrets.X_REGISTRY_AUTH }}" \
            "${PORTAINER_BASE}/images/create?fromImage=${IMAGE_NAME}")
          echo "$PULL_BODY" | tail -c 2000
          if echo "$PULL_BODY" | jq -se 'map(select(.errorDetail != null)) | length > 0' >/dev/null 2>&1; then
            echo "ERROR: pull 响应包含 errorDetail,abort"
            exit 1
          fi

          echo "==> Step 2/5: inspect 验证镜像在 daemon 里"
          INSPECT_HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "X-API-Key: ${{ secrets.PORTAINER_ACCESS_TOKEN }}" \
            "${PORTAINER_BASE}/images/${IMAGE_NAME}/json")
          if [ "$INSPECT_HTTP" != "200" ]; then
            echo "ERROR: image inspect 返回 HTTP $INSPECT_HTTP"
            exit 1
          fi
          echo "镜像验证通过 ✓"

          echo "==> Step 3/5: 备份老容器 → $OLD_NAME"
          OLD_ID=$(container_id_by_name "$CONTAINER_NAME" || true)
          HAVE_OLD=""
          if [ -n "$OLD_ID" ]; then
            HAVE_OLD=1
            echo "找到老容器 $OLD_ID"
            api POST "/containers/$OLD_ID/stop" || echo "stop 非 2xx(可能已停)"
            api POST "/containers/$OLD_ID/rename?name=$OLD_NAME"
            echo "老容器已备份为 $OLD_NAME"
          else
            echo "没有老容器,首次部署"
          fi

          echo "==> Step 4/5: create + start 新容器 $CONTAINER_NAME"
          # docker-host-master 特异点:
          # - Binds: docker.sock + /etc/hosts (host bind) + docker-host-master-data (named volume)
          # - NetworkMode: janyee_net + EndpointsConfig.janyee_net: {} → 只指网络,不指 IP
          # - CapAdd: DAC_OVERRIDE 才能写 /etc/hosts
          # - PortBindings 8090:8090
          CREATE_RESPONSE=$(curl -s -X POST \
            -H "X-API-Key: ${{ secrets.PORTAINER_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "Image": "'"$IMAGE_TAG"'",
              "Hostname": "'"$CONTAINER_NAME"'",
              "Env": [
                "REDIS_ADDR='"$REDIS_ADDR"'",
                "REDIS_PASSWORD='"${{ secrets.REDIS_PASSWORD }}"'",
                "REDIS_DB='"$REDIS_DB"'"
              ],
              "Labels": {
                "environment": "production",
                "version": "'"$GITHUB_REF_NAME"'",
                "app": "'"$CONTAINER_NAME"'"
              },
              "ExposedPorts": { "8090/tcp": {} },
              "HostConfig": {
                "Binds": [
                  "/var/run/docker.sock:/var/run/docker.sock:rw",
                  "/etc/hosts:/etc/hosts:rw",
                  "docker-host-master-data:/var/lib/docker-host-master"
                ],
                "NetworkMode": "janyee_net",
                "PortBindings": { "8090/tcp": [{ "HostPort": "8090" }] },
                "RestartPolicy": { "Name": "unless-stopped" },
                "CapAdd": ["DAC_OVERRIDE"],
                "Privileged": false,
                "AutoRemove": false
              },
              "NetworkingConfig": {
                "EndpointsConfig": {
                  "janyee_net": {}
                }
              }
            }' \
            "${PORTAINER_BASE}/containers/create?name=${CONTAINER_NAME}")
          echo "Create Response: $CREATE_RESPONSE"
          NEW_ID=$(echo "$CREATE_RESPONSE" | jq -r '.Id // empty')
          if [ -z "$NEW_ID" ]; then
            echo "ERROR: create 失败,响应:$CREATE_RESPONSE"
            [ -n "$HAVE_OLD" ] && rollback "$OLD_NAME" "" || true
            exit 1
          fi
          if ! api POST "/containers/$NEW_ID/start"; then
            echo "ERROR: start 失败"
            [ -n "$HAVE_OLD" ] && rollback "$OLD_NAME" "$NEW_ID" || true
            exit 1
          fi

          echo "==> Step 5/5: 等 8s + 检查 State.Running"
          sleep 8
          STATE=$(api GET "/containers/$NEW_ID/json" | jq -r '.State.Running')
          if [ "$STATE" != "true" ]; then
            echo "ERROR: 新容器 State.Running=$STATE,启动失败,最后 100 行 log:"
            api GET "/containers/$NEW_ID/logs?stdout=true&stderr=true&tail=100" || true
            [ -n "$HAVE_OLD" ] && rollback "$OLD_NAME" "$NEW_ID" || true
            exit 1
          fi

          echo "==> Deploy 成功:$IMAGE_TAG (endpoint=$ENDPOINT_ID, NEW_ID=$NEW_ID)"
          if [ -n "$HAVE_OLD" ]; then
            echo "清理备份的老容器 $OLD_NAME"
            OLD_BAK_ID=$(container_id_by_name "$OLD_NAME" || true)
            [ -n "$OLD_BAK_ID" ] && api DELETE "/containers/$OLD_BAK_ID?force=true" || true
          fi
